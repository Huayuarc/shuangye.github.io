name: Build Theos Projects

on:
  push:
    branches: ["main"]
    paths:
      - "debs/**"
      - ".github/workflows/build-theos.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Theos (roothide fork)
        run: |
          set -x
          rm -rf "$HOME/theos"
          # 使用 roothide/theos 分支，提供 vendor 中的 roothide 模块和 libroothide.tbd
          git clone --recursive https://github.com/roothide/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          # 确保 vendor 子模块完整
          cd "$HOME/theos"
          git submodule update --init --recursive || true
          cd "$OLDPWD"
          # ldid: 签名必需
          brew install ldid 2>/dev/null || true
          # 下载 Theos SDK
          mkdir -p "$HOME/theos/sdks"
          curl -fsSL -o /tmp/sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
          tar -xf /tmp/sdk.tar.xz -C "$HOME/theos/sdks/"
          rm -f /tmp/sdk.tar.xz
          ls -la "$HOME/theos/sdks/"

      - name: Build roothide
        working-directory: debs
        run: |
          set -x
          export ARCHS="arm64 arm64e"
          # 验证 roothide 模块齐全
          echo "=== 检查 roothide vendor 文件 ==="
          ls -la "$THEOS/vendor/include/roothide.h" 2>/dev/null || echo "MISSING: vendor/include/roothide.h"
          ls -la "$THEOS/vendor/include/roothide/" 2>/dev/null || echo "MISSING: vendor/include/roothide/"
          ls -la "$THEOS/vendor/mod/roothide/" 2>/dev/null || echo "MISSING: vendor/mod/roothide/"
          ls -la "$THEOS/vendor/lib/libroothide.tbd" 2>/dev/null || echo "MISSING: vendor/lib/libroothide.tbd"
          echo "=== 开始编译 ==="
          make clean
          make FINALPACKAGE=1 2>&1
          make package FINALPACKAGE=1 2>&1
          echo "=== 构建产物 ==="
          ls -la packages/*.deb 2>/dev/null

      - name: Collect debs
        if: always()
        run: |
          set -x
          mkdir -p ${{ github.workspace }}/packages
          cp ${{ github.workspace }}/debs/packages/*.deb ${{ github.workspace }}/packages/ 2>/dev/null || echo "无 deb"
          ls -la ${{ github.workspace }}/packages/

      - name: Commit and push debs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/
          if git diff --quiet --cached; then
            echo "无新 deb 需要提交"
          else
            deb_name=$(ls packages/*.deb 2>/dev/null | head -1 | xargs -I{} basename {} .deb | sed 's/_[0-9].*//')
            [ -z "$deb_name" ] && deb_name="tweak"
            git commit -m "chore: 自动构建 ${deb_name} [ci skip]"
            git push
          fi
