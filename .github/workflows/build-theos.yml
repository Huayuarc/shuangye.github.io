name: Build Theos Projects

on:
  push:
    branches: ["main"]
    paths:
      - "debs/**"
      - ".github/workflows/build-theos.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Theos (roothide fork)
        run: |
          set -x
          rm -rf "$HOME/theos"
          # 使用 roothide/theos 分支，提供 vendor 中的 roothide 模块和 libroothide.tbd
          git clone --recursive https://github.com/roothide/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          # 确保 vendor 子模块完整
          cd "$HOME/theos"
          git submodule update --init --recursive || true
          cd "$OLDPWD"
          # ldid: 签名必需
          brew install ldid 2>/dev/null || true
          # 下载 Theos SDK
          mkdir -p "$HOME/theos/sdks"
          curl -fsSL -o /tmp/sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
          tar -xf /tmp/sdk.tar.xz -C "$HOME/theos/sdks/"
          rm -f /tmp/sdk.tar.xz
          ls -la "$HOME/theos/sdks/"

      - name: Build rootless (arm64)
        working-directory: debs
        run: |
          set -x
          export ARCHS="arm64 arm64e"
          echo "=== 编译 rootless (arm64) ==="
          make clean
          make FINALPACKAGE=1 2>&1
          make package FINALPACKAGE=1 2>&1
          echo "=== rootless 构建产物 ==="
          ls -la packages/*.deb 2>/dev/null
          # 保存 rootless deb 到临时目录
          mkdir -p ${{ github.workspace }}/debs-rootless
          cp packages/*.deb ${{ github.workspace }}/debs-rootless/ 2>/dev/null || echo "无 rootless deb"

      - name: Build roothide (arm64e)
        continue-on-error: true
        working-directory: debs
        run: |
          set -x
          export ARCHS="arm64 arm64e"
          echo "=== 检查 roothide vendor 文件 ==="
          ls -la "$THEOS/vendor/include/roothide.h" 2>/dev/null || { echo "MISSING: roothide vendor 不存在，跳过 roothide 构建"; exit 0; }
          ls -la "$THEOS/vendor/mod/roothide/" 2>/dev/null || { echo "MISSING: roothide mod 不存在，跳过 roothide 构建"; exit 0; }
          ls -la "$THEOS/vendor/lib/libroothide.tbd" 2>/dev/null || { echo "MISSING: libroothide.tbd 不存在，跳过 roothide 构建"; exit 0; }
          echo "=== 编译 roothide (arm64e) ==="
          make clean
          make SCHEME=roothide FINALPACKAGE=1 2>&1
          make SCHEME=roothide package FINALPACKAGE=1 2>&1
          echo "=== roothide 构建产物 ==="
          ls -la packages/*.deb 2>/dev/null
          # 保存 roothide deb 到临时目录
          mkdir -p ${{ github.workspace }}/debs-roothide
          cp packages/*.deb ${{ github.workspace }}/debs-roothide/ 2>/dev/null || echo "无 roothide deb"

      - name: Collect debs
        if: always()
        run: |
          set -x
          mkdir -p ${{ github.workspace }}/packages
          echo "=== rootless debs ==="
          ls -la ${{ github.workspace }}/debs-rootless/ 2>/dev/null || echo "无"
          cp ${{ github.workspace }}/debs-rootless/*.deb ${{ github.workspace }}/packages/ 2>/dev/null || true
          echo "=== roothide debs ==="
          ls -la ${{ github.workspace }}/debs-roothide/ 2>/dev/null || echo "无"
          cp ${{ github.workspace }}/debs-roothide/*.deb ${{ github.workspace }}/packages/ 2>/dev/null || true
          echo "=== 汇总产物 ==="
          ls -la ${{ github.workspace }}/packages/

      - name: Commit and push debs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/
          if git diff --quiet --cached; then
            echo "无新 deb 需要提交"
          else
            deb_list=$(ls packages/*.deb 2>/dev/null | xargs -I{} basename {} | tr '\n' ' ')
            echo "提交 debs: $deb_list"
            git commit -m "chore: 自动构建 deb 包 [ci skip]"
            git push
          fi
