name: Build Theos Projects

on:
  push:
    branches: ["main"]
    paths:
      - "debs/**"
      - ".github/workflows/build-theos.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Theos
        run: |
          set -x
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          mkdir -p "$HOME/theos/sdks"
          # 从 Theos SDK 仓库直接下载 iPhoneOS16.5.sdk（含 IOKit for iOS）
          curl -fsSL -o /tmp/sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
          tar -xJf /tmp/sdk.tar.xz -C "$HOME/theos/sdks/"
          rm -f /tmp/sdk.tar.xz
          ls -la "$HOME/theos/sdks/"

      - name: Verify IOKit SDK
        run: |
          set -x
          SDK="$HOME/theos/sdks/iPhoneOS16.5.sdk"
          ls -la "$SDK/System/Library/Frameworks/IOKit.framework/" 2>&1
          echo "=== 测试 IOKit 编译 ==="
          cat > /tmp/test_iokit.c << 'EOF'
          #include <IOKit/IOKitLib.h>
          int main() { return 0; }
          EOF
          cc -c /tmp/test_iokit.c -isysroot "$SDK" -target arm64-apple-ios15.0 -o /tmp/test_iokit.o 2>&1 && echo "IOKit 编译测试通过" || echo "IOKit 编译测试失败"
          rm -f /tmp/test_iokit.c /tmp/test_iokit.o

      - name: Verify Theos
        working-directory: debs
        run: |
          set -x
          echo "THEOS=$THEOS"
          ls -la "$THEOS/sdks/"
          echo "=== TARGET ==="
          grep '^TARGET' Makefile
          echo "=== make clean ==="
          make clean 2>&1 || echo "clean: $?"
          echo "=== 环境 ==="
          env | grep -E "THEOS|ARCH|SCHEME" || true

      - name: Build rootless
        working-directory: debs
        run: |
          set -x
          export THEOS_PACKAGE_SCHEME=rootless
          export ARCHS="arm64 arm64e"
          make clean
          make FINALPACKAGE=1 2>&1
          make package FINALPACKAGE=1 2>&1
          ls -la packages/*.deb 2>/dev/null || echo "rootless: 未找到 deb"

      - name: Build roothide (optional, 需要 libroothide)
        id: build_roothide
        working-directory: debs
        continue-on-error: true
        run: |
          set -x
          # 检查是否可用 libroothide
          if ! echo '#include <roothide.h>' | cc -x c - -fsyntax-only 2>/dev/null; then
            echo "libroothide 不可用（CI 环境），跳过 roothide 构建"
            exit 0
          fi
          export THEOS_PACKAGE_SCHEME=roothide
          export ARCHS="arm64 arm64e"
          make clean
          make FINALPACKAGE=1 SCHEME=roothide 2>&1
          make package FINALPACKAGE=1 SCHEME=roothide 2>&1
          ls -la packages/*.deb 2>/dev/null || echo "roothide: 未找到 deb"

      - name: Collect debs
        if: always()
        working-directory: debs
        run: |
          set -x
          mkdir -p ${{ github.workspace }}/packages
          cp packages/*.deb ${{ github.workspace }}/packages/ 2>/dev/null || echo "无 deb 可复制"
          ls -la ${{ github.workspace }}/packages/ || echo "packages 目录为空"

      - name: Commit and push deb
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/
          if git diff --quiet --cached; then
            echo "无新 deb 需要提交"
          else
            git commit -m "chore: 自动构建 CPUthermal [ci skip]"
            git push
          fi
