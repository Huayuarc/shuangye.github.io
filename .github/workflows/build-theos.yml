name: Build Theos Projects

on:
  push:
    branches: ["main"]
    paths:
      - "debs/**"
      - ".github/workflows/build-theos.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Theos
        run: |
          set -x
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          # 优先使用 Xcode 内置 SDK，但 IOKit 需要从 macOS SDK 补全
          XCODE_SDK="/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk"
          if [ -d "$XCODE_SDK" ]; then
            mkdir -p "$HOME/theos/sdks"
            ln -sf "$XCODE_SDK" "$HOME/theos/sdks/iPhoneOS16.5.sdk"
            # Xcode iPhoneOS SDK 缺少 IOKit 框架（macOS only），从 macOS SDK 复制
            MACOS_SDK="/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk"
            IOS_SDK_DIR="$HOME/theos/sdks/iPhoneOS16.5.sdk"
            IOKIT_DST="$IOS_SDK_DIR/System/Library/Frameworks/IOKit.framework"
            if [ -d "$MACOS_SDK/System/Library/Frameworks/IOKit.framework" ] && [ -d "$IOS_SDK_DIR" ] && [ ! -f "$IOKIT_DST/Headers/IOKitLib.h" ]; then
              mkdir -p "$IOKIT_DST"
              cp -R "$MACOS_SDK/System/Library/Frameworks/IOKit.framework/Headers" "$IOKIT_DST/"
              # 复制 IOKit 的 tbd 以正确链接
              cp "$MACOS_SDK/System/Library/Frameworks/IOKit.framework/IOKit.tbd" "$IOKIT_DST/" 2>/dev/null || true
              echo "已从 macOS SDK 复制 IOKit 头文件到 iOS SDK"
            fi
            ls -la "$HOME/theos/sdks/"
          else
            $HOME/theos/bin/install-sdk latest || echo "SDK 下载失败，使用 install-sdk"
          fi

      - name: Verify Theos
        working-directory: debs
        run: |
          set -x
          echo "THEOS=$THEOS"
          ls -la "$THEOS/makefiles/" | head -5
          ls -la "$THEOS/sdks/" | head -5
          echo "=== 尝试 make clean ==="
          make clean || echo "clean 结果: $?"
          echo "=== 环境变量 ==="
          env | grep -E "THEOS|ARCH|SCHEME" || true

      - name: Build rootless
        working-directory: debs
        run: |
          set -x
          export THEOS_PACKAGE_SCHEME=rootless
          export ARCHS="arm64 arm64e"
          make clean
          make FINALPACKAGE=1 2>&1
          make package FINALPACKAGE=1 2>&1
          ls -la packages/*.deb 2>/dev/null || echo "rootless: 未找到 deb"

      - name: Build roothide
        working-directory: debs
        run: |
          set -x
          export THEOS_PACKAGE_SCHEME=roothide
          export ARCHS="arm64 arm64e"
          make clean
          make FINALPACKAGE=1 SCHEME=roothide 2>&1
          make package FINALPACKAGE=1 SCHEME=roothide 2>&1
          ls -la packages/*.deb 2>/dev/null || echo "roothide: 未找到 deb"

      - name: Collect debs
        working-directory: debs
        run: |
          set -x
          mkdir -p ${{ github.workspace }}/packages
          cp packages/*.deb ${{ github.workspace }}/packages/ 2>/dev/null || echo "无 deb 可复制"
          ls -la ${{ github.workspace }}/packages/ || echo "packages 目录为空"

      - name: Commit and push deb
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/
          if ! git diff --quiet --cached; then
            git commit -m "chore: 自动构建 CPUthermal [ci skip]"
            git push
          else
            echo "无新 deb 需要提交"
          fi
