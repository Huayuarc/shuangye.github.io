name: Build Theos Projects

on:
  push:
    branches: ["main"]
    paths:
      - "debs/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        project:
          - name: InsulationPrefs
            package-scheme: rootless

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Theos
        run: |
          # 克隆 Theos（跳过 install 脚本，避免 SDK 下载失败）
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          # 优先使用 Xcode 内置 SDK
          XCODE_SDK="/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk"
          if [ -d "$XCODE_SDK" ]; then
            mkdir -p "$HOME/theos/sdks"
            ln -sf "$XCODE_SDK" "$HOME/theos/sdks/iPhoneOS16.5.sdk"
            echo "使用 Xcode 内置 SDK"
          else
            # 回退：尝试远程下载 SDK
            $HOME/theos/bin/install-sdk latest || echo "SDK 下载失败，使用 Xcode 默认 SDK"
          fi

      - name: Build ${{ matrix.project.name }}
        working-directory: debs
        run: |
          export THEOS_PACKAGE_SCHEME=${{ matrix.project.package-scheme }}
          export ARCHS="arm64 arm64e"
          make clean
          make package FINALPACKAGE=1
          # 复制 deb 到 packages/
          mkdir -p ${{ github.workspace }}/packages
          cp packages/*.deb ${{ github.workspace }}/packages/ 2>/dev/null || true

      - name: Commit and push deb
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/
          if ! git diff --quiet --cached; then
            git commit -m "chore: 自动构建 ${{ matrix.project.name }}"
            git push
          fi
