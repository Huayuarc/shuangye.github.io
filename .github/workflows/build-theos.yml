name: Build Theos Projects

on:
  push:
    branches: ["main"]
    paths:
      - "debs/**"
      - ".github/workflows/build-theos.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Theos (roothide fork)
        run: |
          set -x
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version
          command -v swift-build || xcrun --find swift-build
          rm -rf "$HOME/theos"
          git clone --recursive --branch master https://github.com/roothide/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          cd "$HOME/theos"
          git submodule update --init --recursive 2>&1
          echo "=== 验证 roothide vendor ==="
          ls -la vendor/include/roothide.h
          ls -la vendor/mod/roothide/
          ls -la vendor/lib/libroothide.tbd
          echo "=== vendor 验证完毕 ==="
          cd "$OLDPWD"
          brew install ldid dpkg 2>/dev/null || true
          mkdir -p "$HOME/theos/sdks"
          curl -fsSL -o /tmp/sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
          tar -xf /tmp/sdk.tar.xz -C "$HOME/theos/sdks/"
          rm -f /tmp/sdk.tar.xz
          ls -la "$HOME/theos/sdks/"

      - name: Build rootless (arm64)
        working-directory: debs
        run: |
          set -x
          export ARCHS="arm64 arm64e"
          mkdir -p "${{ github.workspace }}/debs-rootless"
          LOGFILE="${{ github.workspace }}/build-rootless.log"
          PKGLOGFILE="${{ github.workspace }}/build-rootless-pkg.log"

          shopt -s nullglob
          for proj in */; do
            proj="${proj%/}"
            mf="${proj}/Makefile"
            [ -f "$mf" ] || continue
            grep -qE "(TWEAK_NAME|TOOL_NAME|APPLICATION_NAME)" "$mf" 2>/dev/null || continue

            echo ""
            echo "=== 编译 [$proj] rootless (arm64) ==="
            pushd "$proj" >/dev/null

            echo "--- 项目文件清单 ---"
            find . -maxdepth 2 -not -path './.git/*' -type f | head -50
            echo "--- Makefile 内容 ---"
            cat -n Makefile 2>/dev/null || echo "无 Makefile"

            make clean 2>/dev/null || true
            set +e
            make THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 2>&1 | tee "$LOGFILE"
            RC=${PIPESTATUS[0]}
            echo "make exit code: $RC"
            echo "=== 完整构建日志 ($(wc -l < "$LOGFILE") 行) ==="
            cat "$LOGFILE"
            echo "=== 日志结束 ==="
            [ "$RC" -eq 0 ] || exit "$RC"
            set +e
            make THEOS_PACKAGE_SCHEME=rootless package FINALPACKAGE=1 2>&1 | tee "$PKGLOGFILE"
            PKG_RC=${PIPESTATUS[0]}
            echo "make package exit code: $PKG_RC"
            echo "=== 完整打包日志 ==="
            cat "$PKGLOGFILE"
            echo "=== 日志结束 ==="
            [ "$PKG_RC" -eq 0 ] || exit "$PKG_RC"
            mkdir -p "${{ github.workspace }}/debs-rootless/$proj"
            cp packages/*.deb "${{ github.workspace }}/debs-rootless/$proj/" 2>/dev/null || true
            popd >/dev/null
          done

          rootless_count=$(ls "${{ github.workspace }}/debs-rootless/"*/ 2>/dev/null | wc -l)
          echo "rootless 项目数: $rootless_count"

          # 将构建日志写入 GITHUB_STEP_SUMMARY 以便在 UI 中直接查看
          {
            echo "## Rootless 构建日志"
            echo '```'
            cat "$LOGFILE" 2>/dev/null || echo "无日志"
            echo '```'
            echo "## Rootless 打包日志"
            echo '```'
            cat "$PKGLOGFILE" 2>/dev/null || echo "无日志"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-*.log

      - name: Build roothide (arm64e)
        continue-on-error: true
        working-directory: debs
        run: |
          set -x
          export ARCHS="arm64 arm64e"

          echo "=== 检查 THEOS roothide vendor ==="
          ls -la "$THEOS/vendor/include/roothide.h" 2>/dev/null && echo "roothide.h 存在"
          ls -la "$THEOS/vendor/mod/roothide/" 2>/dev/null && echo "roothide mod 存在"
          ls -la "$THEOS/vendor/lib/libroothide.tbd" 2>/dev/null && echo "libroothide.tbd 存在"

          mkdir -p "${{ github.workspace }}/debs-roothide"

          shopt -s nullglob
          ANY=0
          for proj in */; do
            proj="${proj%/}"
            mf="${proj}/Makefile"
            [ -f "$mf" ] || continue
            grep -qE "(TWEAK_NAME|TOOL_NAME|APPLICATION_NAME)" "$mf" 2>/dev/null || continue
            ANY=1

            echo ""
            echo "=== 编译 [$proj] roothide (arm64e) ==="
            pushd "$proj" >/dev/null
            make clean 2>/dev/null || true
            make THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 2>&1
            make THEOS_PACKAGE_SCHEME=roothide package FINALPACKAGE=1 2>&1
            mkdir -p "${{ github.workspace }}/debs-roothide/$proj"
            cp packages/*.deb "${{ github.workspace }}/debs-roothide/$proj/" 2>/dev/null || true
            popd >/dev/null
          done

          roothide_count=$(find "${{ github.workspace }}/debs-roothide" -name "*.deb" 2>/dev/null | wc -l)
          echo "roothide deb 数量: $roothide_count"
          [ "$ANY" -eq 0 ] && echo "未找到 Theos 项目"
          [ "$roothide_count" -eq 0 ] && echo "⚠ roothide 未产出 deb（可能 vendor 不支持）"

      - name: Collect debs
        if: always()
        run: |
          set -x
          mkdir -p "${{ github.workspace }}/packages"

          echo "=== rootless debs ==="
          find "${{ github.workspace }}/debs-rootless" -name "*.deb" -exec cp {} "${{ github.workspace }}/packages/" \; 2>/dev/null || echo "无 rootless debs"

          echo "=== roothide debs ==="
          find "${{ github.workspace }}/debs-roothide" -name "*.deb" -exec cp {} "${{ github.workspace }}/packages/" \; 2>/dev/null || echo "无 roothide debs"

          echo "=== 汇总 ==="
          ls -la "${{ github.workspace }}/packages/" || echo "packages 为空"

      - name: Commit and push debs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/
          if git diff --quiet --cached; then
            echo "无新 deb 需要提交"
          else
            deb_list=$(ls packages/*.deb 2>/dev/null | xargs -I{} basename {} | tr '\n' ' ')
            echo "提交 debs: $deb_list"
            git commit -m "chore: 自动构建 deb 包 [ci skip]"
            git push
          fi
