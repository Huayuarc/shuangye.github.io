name: Build Theos Projects

on:
  push:
    branches: ["main"]
    paths:
      - "debs/**"
      - ".github/workflows/build-theos.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Theos
        run: |
          set -x
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          # ldid: Theos 签名必需，macOS runner 默认没有
          brew install ldid 2>/dev/null || true
          # 下载 Theos SDK（含 IOKit for iOS）
          mkdir -p "$HOME/theos/sdks"
          curl -fsSL -o /tmp/sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
          tar -xf /tmp/sdk.tar.xz -C "$HOME/theos/sdks/"
          rm -f /tmp/sdk.tar.xz
          ls -la "$HOME/theos/sdks/"

      - name: Build rootless
        working-directory: debs
        run: |
          set -x
          export THEOS_PACKAGE_SCHEME=rootless
          export ARCHS="arm64"
          make clean
          make FINALPACKAGE=1 2>&1
          make package FINALPACKAGE=1 2>&1
          ls -la packages/*.deb 2>/dev/null

      - name: Collect debs
        if: always()
        run: |
          set -x
          mkdir -p ${{ github.workspace }}/packages
          cp ${{ github.workspace }}/debs/packages/*.deb ${{ github.workspace }}/packages/ 2>/dev/null || echo "无 deb"
          ls -la ${{ github.workspace }}/packages/

      - name: Commit and push debs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/
          if git diff --quiet --cached; then
            echo "无新 deb 需要提交"
          else
            git commit -m "chore: 自动构建 CPUthermal [ci skip]"
            git push
          fi
